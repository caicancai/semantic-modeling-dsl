<svg width="1500" height="880" viewBox="0 0 1500 880" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="880" fill="#ffffff"/>
  <text x="750" y="52" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#111827">Filter Mapping Across Derived Views</text>
  <text x="750" y="86" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#4B5563">外层查询的过滤条件，需要显式映射到内层 View 的字段，而不是默认拼到最外层 SQL</text>

  <defs>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#7C3AED"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Top: user query -->
  <rect x="130" y="130" width="1240" height="150" rx="22" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="170" y="172" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#4C1D95">User Query / 用户查询</text>
  <text x="170" y="208" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#374151">Query on <tspan font-weight="700">daily_close_reason_rank</tspan></text>
  <text x="170" y="240" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#6B7280">select: close_reason, closed_tickets, rank_of_top_reason</text>

  <rect x="790" y="155" width="500" height="96" rx="16" fill="#FFFFFF" stroke="#DDD6FE"/>
  <text x="820" y="189" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#4C1D95">query filters</text>
  <text x="820" y="217" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#374151">query.filter.closed_date = 2026-01-01..2026-01-31</text>
  <text x="820" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#374151">query.filter.tenant_id = t_001</text>

  <!-- Middle: derived view -->
  <rect x="130" y="365" width="1240" height="190" rx="22" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="170" y="407" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#1E3A8A">Derived View / 派生 View</text>
  <text x="170" y="441" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#374151">daily_close_reason_rank</text>
  <text x="170" y="471" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#6B7280">from: view(closed_ticket)</text>

  <rect x="610" y="393" width="650" height="132" rx="16" fill="#FFFFFF" stroke="#BFDBFE"/>
  <text x="640" y="427" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#1E3A8A">filter mapping / 过滤映射</text>
  <text x="640" y="459" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#374151">from query.filter.closed_date → to input.field(closed_date)</text>
  <text x="640" y="487" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#374151">from query.filter.tenant_id → to input.field(tenant_id)</text>
  <text x="640" y="515" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#6B7280">apply: before aggregate</text>

  <!-- Bottom: read view -->
  <rect x="130" y="640" width="1240" height="150" rx="22" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="170" y="682" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#065F46">Read View / 内层 View</text>
  <text x="170" y="716" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#374151">closed_ticket</text>
  <text x="170" y="746" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#6B7280">base filter: event_type = 'ticket_closed'</text>

  <rect x="610" y="668" width="650" height="92" rx="16" fill="#FFFFFF" stroke="#A7F3D0"/>
  <text x="640" y="702" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#065F46">fields available before aggregate</text>
  <text x="640" y="733" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#374151">ticket_id, tenant_id, closed_date, close_reason, resolution_seconds</text>

  <!-- Arrows -->
  <path d="M1040 252 C1040 310 990 326 990 386" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <path d="M930 525 C930 582 930 604 930 665" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="1060" y="330" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#7C3AED">query filter</text>
  <text x="945" y="602" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#2563EB">map to inner field</text>

  <!-- Callouts -->
  <rect x="130" y="815" width="600" height="42" rx="12" fill="#FEF2F2" stroke="#FCA5A5"/>
  <text x="154" y="842" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#991B1B">不要默认拼到最外层：最外层可能没有 closed_date 字段</text>

  <rect x="770" y="815" width="600" height="42" rx="12" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="794" y="842" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#166534">显式映射后，编译器才能把 filter 放到正确的 SQL 层级</text>
</svg>
