<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <defs>
    <style>
      .title { font: 700 32px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .sub { font: 600 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .text { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .small { font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .badText { font: 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #991b1b; }
      .goodText { font: 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #065f46; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 22; }
      .badBox { fill: #fef2f2; stroke: #f87171; stroke-width: 2; rx: 16; }
      .badBox2 { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 16; }
      .goodRoot { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 16; }
      .goodBox { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 16; }
      .field { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1; rx: 7; }
      .badField { fill: #fee2e2; stroke: #fecaca; stroke-width: 1; rx: 7; }
      .goodField { fill: #dcfce7; stroke: #86efac; stroke-width: 1; rx: 7; }
      .badArrow { stroke: #dc2626; stroke-width: 3; fill: none; marker-end: url(#badArrow); }
      .goodArrow { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#goodArrow); }
      .grayArrow { stroke: #6b7280; stroke-width: 2.5; fill: none; marker-end: url(#grayArrow); }
    </style>
    <marker id="badArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626" /></marker>
    <marker id="goodArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#059669" /></marker>
    <marker id="grayArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280" /></marker>
  </defs>

  <rect width="1500" height="820" fill="#f8fafc" />
  <text x="750" y="54" text-anchor="middle" class="title">继承式建模 vs 派生式建模</text>
  <text x="750" y="90" text-anchor="middle" class="text">差异不只是字段是否复制，更是建模结构：线性条形链路 vs 可发散的树形 / DAG。</text>

  <rect x="55" y="125" width="665" height="620" class="panel" />
  <rect x="780" y="125" width="665" height="620" class="panel" />

  <text x="388" y="165" text-anchor="middle" class="sub">不推荐：继承式条形建模</text>
  <text x="1112" y="165" text-anchor="middle" class="sub">推荐：显式派生的树形建模</text>

  <!-- Left side: chain inheritance -->
  <rect x="115" y="215" width="190" height="230" class="badBox2" />
  <text x="210" y="245" text-anchor="middle" class="sub">View A</text>
  <text x="210" y="272" text-anchor="middle" class="small">closed_ticket</text>
  <rect x="140" y="295" width="140" height="25" class="field" /><text x="210" y="313" text-anchor="middle" class="small">ticket_id</text>
  <rect x="140" y="325" width="140" height="25" class="field" /><text x="210" y="343" text-anchor="middle" class="small">tenant_id</text>
  <rect x="140" y="355" width="140" height="25" class="field" /><text x="210" y="373" text-anchor="middle" class="small">close_reason</text>
  <rect x="140" y="385" width="140" height="25" class="field" /><text x="210" y="403" text-anchor="middle" class="small">agent_id</text>

  <path d="M310 330 C335 330, 360 330, 385 330" class="badArrow" />
  <text x="347" y="310" text-anchor="middle" class="badText">extends</text>

  <rect x="390" y="215" width="190" height="230" class="badBox" />
  <text x="485" y="245" text-anchor="middle" class="sub">View B</text>
  <text x="485" y="272" text-anchor="middle" class="small">closed_ticket_resolution</text>
  <rect x="415" y="295" width="140" height="25" class="badField" /><text x="485" y="313" text-anchor="middle" class="small">A 的全部字段</text>
  <rect x="415" y="325" width="140" height="25" class="badField" /><text x="485" y="343" text-anchor="middle" class="small">+ 新字段</text>
  <rect x="415" y="355" width="140" height="25" class="badField" /><text x="485" y="373" text-anchor="middle" class="small">+ 隐式依赖</text>
  <rect x="415" y="385" width="140" height="25" class="badField" /><text x="485" y="403" text-anchor="middle" class="small">+ 暴露扩大</text>

  <path d="M485 450 C485 475, 485 500, 485 525" class="badArrow" />
  <text x="545" y="490" text-anchor="middle" class="badText">extends</text>

  <rect x="390" y="530" width="190" height="130" class="badBox" />
  <text x="485" y="560" text-anchor="middle" class="sub">View C</text>
  <text x="485" y="587" text-anchor="middle" class="small">daily_close_reason_rank</text>
  <rect x="415" y="610" width="140" height="25" class="badField" /><text x="485" y="628" text-anchor="middle" class="small">B 的全部字段</text>

  <text x="210" y="505" text-anchor="middle" class="badText">形态：A → B → C</text>
  <text x="210" y="535" text-anchor="middle" class="badText">字段和依赖持续累积</text>
  <text x="388" y="700" text-anchor="middle" class="badText">问题：每一层自动携带上游全部表面，边界越来越难解释。</text>

  <!-- Right side: branching derivation -->
  <rect x="1030" y="205" width="190" height="165" class="goodRoot" />
  <text x="1125" y="235" text-anchor="middle" class="sub">上游 View</text>
  <text x="1125" y="262" text-anchor="middle" class="small">closed_ticket</text>
  <rect x="1055" y="285" width="140" height="25" class="field" /><text x="1125" y="303" text-anchor="middle" class="small">稳定业务字段</text>
  <rect x="1055" y="315" width="140" height="25" class="field" /><text x="1125" y="333" text-anchor="middle" class="small">dimensions</text>

  <rect x="850" y="500" width="190" height="145" class="goodBox" />
  <text x="945" y="530" text-anchor="middle" class="sub">派生 View 1</text>
  <text x="945" y="557" text-anchor="middle" class="small">closed_ticket_resolution</text>
  <rect x="875" y="580" width="140" height="25" class="goodField" /><text x="945" y="598" text-anchor="middle" class="small">选择字段</text>
  <rect x="875" y="610" width="140" height="25" class="goodField" /><text x="945" y="628" text-anchor="middle" class="small">新增计算列</text>

  <rect x="1060" y="500" width="190" height="145" class="goodBox" />
  <text x="1155" y="530" text-anchor="middle" class="sub">派生 View 2</text>
  <text x="1155" y="557" text-anchor="middle" class="small">daily_close_reason_rank</text>
  <rect x="1085" y="580" width="140" height="25" class="goodField" /><text x="1155" y="598" text-anchor="middle" class="small">聚合结果</text>
  <rect x="1085" y="610" width="140" height="25" class="goodField" /><text x="1155" y="628" text-anchor="middle" class="small">window 字段</text>

  <rect x="1270" y="500" width="135" height="145" class="goodBox" />
  <text x="1337" y="530" text-anchor="middle" class="sub">派生 View 3</text>
  <text x="1337" y="557" text-anchor="middle" class="small">future_sla_view</text>
  <rect x="1287" y="580" width="100" height="25" class="goodField" /><text x="1337" y="598" text-anchor="middle" class="small">过滤</text>
  <rect x="1287" y="610" width="100" height="25" class="goodField" /><text x="1337" y="628" text-anchor="middle" class="small">重命名</text>

  <path d="M1090 372 C1050 420, 990 455, 960 495" class="goodArrow" />
  <path d="M1125 372 C1135 420, 1145 455, 1155 495" class="goodArrow" />
  <path d="M1170 372 C1235 420, 1300 455, 1330 495" class="goodArrow" />

  <text x="1112" y="690" text-anchor="middle" class="goodText">形态：一个稳定上游 View 可以发散出多个下游 View。</text>
  <text x="1112" y="720" text-anchor="middle" class="goodText">每个下游 View 显式声明自己的输出契约，适合扩展新的分析场景。</text>
</svg>
